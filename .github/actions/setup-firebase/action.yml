name: 'Setup Firebase Configuration'
description: 'Fetches Firebase config from the backend and injects google-services.json and GoogleService-Info.plist'

inputs:
  build_id:
    description: 'Internal build ID'
    required: true
  appnatively_secrets:
    description: 'JSON string containing APPNATIVELY_SECRETS'
    required: true

runs:
  using: "composite"
  steps:
    - name: Fetch and Inject Firebase Configuration
      shell: bash
      env:
        SECRETS_JSON: ${{ inputs.appnatively_secrets }}
      run: |
        set -e
        echo "🔥 Setting up Firebase configuration..."

        # 1. Extract API URL from secrets
        API_URL=$(echo "$SECRETS_JSON" | jq -r '.EXPO_PUBLIC_API_URL // empty')
        
        if [ -z "$API_URL" ]; then
          echo "⚠️ EXPO_PUBLIC_API_URL not found in secrets. Skipping Firebase setup."
          exit 0
        fi

        # 2. Fetch config from backend
        echo "📡 Fetching config from ${API_URL}/mobile-app/builds/${{ inputs.build_id }}/config"
        CONFIG_RESPONSE=$(curl -s "${API_URL}/mobile-app/builds/${{ inputs.build_id }}/config")
        
        # 3. Extract Firebase configs
        FIREBASE_ANDROID=$(echo "$CONFIG_RESPONSE" | jq -r '.data.firebase_android // empty')
        FIREBASE_IOS=$(echo "$CONFIG_RESPONSE" | jq -r '.data.firebase_ios // empty')

        # 4. Inject Android config
        if [ -n "$FIREBASE_ANDROID" ]; then
          echo "✅ Injecting google-services.json"
          echo "$FIREBASE_ANDROID" > app/google-services.json
        else
          echo "ℹ️ No firebase_android config found."
        fi

        # 5. Inject iOS config
        if [ -n "$FIREBASE_IOS" ]; then
          echo "✅ Injecting GoogleService-Info.plist"
          echo "$FIREBASE_IOS" > app/ios/app/GoogleService-Info.plist
          echo "$FIREBASE_IOS" > app/GoogleService-Info.plist
        else
          echo "ℹ️ No firebase_ios config found."
        fi

        echo "🎉 Firebase configuration complete."
