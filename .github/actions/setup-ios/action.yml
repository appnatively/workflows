inputs:
  ruby_version:
    description: 'Ruby version'
    required: false
    default: '3.3'

runs:
  using: "composite"
  steps:
    - name: Prebuild iOS
      shell: bash
      run: npx expo prebuild --platform ios --non-interactive
      working-directory: app

    - name: Cache Pods
      uses: actions/cache@v5
      with:
        path: app/ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby_version }}
        bundler-cache: true

    - name: Install Pods
      shell: bash
      run: pod install
      working-directory: app/ios

