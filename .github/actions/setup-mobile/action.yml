name: 'Setup Mobile Environment'
description: 'Unified setup for Android and iOS builds including Node, pnpm, and optional CocoaPods'

inputs:
  ios:
    description: 'Whether to run iOS specific setup (prebuild, ruby, pods)'
    required: false
    default: 'false'
  android:
    description: 'Whether to run Android specific setup (java, gradle)'
    required: false
    default: 'false'
  node_version:
    description: 'Node.js version'
    required: false
    default: '24.11'
  java_version:
    description: 'Java version'
    required: false
    default: '17'
  ruby_version:
    description: 'Ruby version'
    required: false
    default: '3.3'
  pnpm_version:
    description: 'pnpm version'
    required: false
    default: '10'

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm_version }}
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
        cache: 'pnpm'
        cache-dependency-path: |
          app/pnpm-lock.yaml
          native-components/pnpm-lock.yaml

    - name: Install Workspace Dependencies (Optimized)
      shell: bash
      run: |
        if [ "${{ inputs.ios }}" == "true" ]; then
          pnpm install --frozen-lockfile --prefer-offline --filter "./app" --filter "./native-components"
        elif [ "${{ inputs.android }}" == "true" ]; then
          pnpm install --frozen-lockfile --prefer-offline --filter "./app"
        else
          pnpm install --frozen-lockfile --prefer-offline
        fi

    # iOS Specific Setup
    - name: Run iOS Setup
      if: inputs.ios == 'true'
      uses: appnatively/workflows/.github/actions/setup-ios@master
      with:
        ruby_version: ${{ inputs.ruby_version }}

    # Android Specific Setup
    - name: Run Android Setup
      if: inputs.android == 'true'
      uses: appnatively/workflows/.github/actions/setup-android@master
      with:
        java_version: ${{ inputs.java_version }}


