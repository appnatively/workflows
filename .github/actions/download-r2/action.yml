name: 'Download from Cloudflare R2'
description: 'Downloads a zip archive from Cloudflare R2 and extracts it into the workspace'

runs:
  using: "composite"
  steps:
    - name: Download and Extract from R2
      shell: bash
      run: |
        # This replaces brittle YAML inputs with a local config-first approach.
        
        CONFIG_FILE="app_config.json"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Configuration file not found at $CONFIG_FILE. Build bootstrap must run first."
          exit 1
        fi
        
        echo "📡 Discovering R2 credentials from $CONFIG_FILE..."
        
        R2_ACCOUNT_ID=$(jq -r '.r2_account_id // empty' "$CONFIG_FILE")
        R2_BUCKET=$(jq -r '.r2_bucket // empty' "$CONFIG_FILE")
        export AWS_ACCESS_KEY_ID=$(jq -r '.r2_access_key_id // empty' "$CONFIG_FILE")
        export AWS_SECRET_ACCESS_KEY=$(jq -r '.r2_secret_access_key // empty' "$CONFIG_FILE")
        SOURCE_VERSION=$(jq -r '.source_version // empty' "$CONFIG_FILE")
        
        if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ] || [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ] || [ -z "$SOURCE_VERSION" ]; then
          echo "❌ Missing required R2 credentials in $CONFIG_FILE."
          exit 1
        fi

        # Determine the file name based on app_type (default to 'app')
        RAW_APP_TYPE=$(jq -r '.app_type // empty' "$CONFIG_FILE")
        APP_TYPE="${RAW_APP_TYPE:-app}"
        FILE_NAME="release-assets-${APP_TYPE}.zip"
        
        echo "🎯 Target file name: ${FILE_NAME}"
        
        ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
        REMOTE_PATH="releases/${SOURCE_VERSION}/${FILE_NAME}"
        
        echo "⬇️ Downloading ${REMOTE_PATH} from R2..."
        
        aws s3 cp \
          --endpoint-url ${ENDPOINT} \
          s3://${R2_BUCKET}/${REMOTE_PATH} \
          ${FILE_NAME}

        echo "📦 Extracting archive ${FILE_NAME}..."
        unzip -qo ${FILE_NAME}
        rm ${FILE_NAME}
        
        echo "✅ R2 Asset Synchronization Complete."
