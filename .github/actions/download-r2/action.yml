name: 'Download from Cloudflare R2'
description: 'Downloads a zip archive from Cloudflare R2 and extracts it into the workspace'

inputs:
  file_name:
    description: 'The name of the zip file to download'
    required: false
    default: 'release-assets.zip'

runs:
  using: "composite"
  steps:
    - name: Download and Extract from R2
      shell: bash
      run: |
        # This replaces brittle YAML inputs with a local config-first approach.
        
        CONFIG_FILE="app_config.json"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Configuration file not found at $CONFIG_FILE. Build bootstrap must run first."
          exit 1
        fi
        
        echo "📡 Discovering R2 credentials from $CONFIG_FILE..."
        
        R2_ACCOUNT_ID=$(jq -r '.r2_account_id // empty' "$CONFIG_FILE")
        R2_BUCKET=$(jq -r '.r2_bucket // empty' "$CONFIG_FILE")
        AWS_ACCESS_KEY_ID=$(jq -r '.r2_access_key_id // empty' "$CONFIG_FILE")
        AWS_SECRET_ACCESS_KEY=$(jq -r '.r2_secret_access_key // empty' "$CONFIG_FILE")
        SOURCE_VERSION=$(jq -r '.source_version // empty' "$CONFIG_FILE")
        
        MISSING_KEYS=""
        [ -z "$R2_ACCOUNT_ID" ] && MISSING_KEYS="$MISSING_KEYS r2_account_id"
        [ -z "$R2_BUCKET" ] && MISSING_KEYS="$MISSING_KEYS r2_bucket"
        [ -z "$AWS_ACCESS_KEY_ID" ] && MISSING_KEYS="$MISSING_KEYS r2_access_key_id"
        [ -z "$AWS_SECRET_ACCESS_KEY" ] && MISSING_KEYS="$MISSING_KEYS r2_secret_access_key"
        [ -z "$SOURCE_VERSION" ] && MISSING_KEYS="$MISSING_KEYS source_version"

        if [ -n "$MISSING_KEYS" ]; then
          echo "❌ Missing required R2 credentials in $CONFIG_FILE: $MISSING_KEYS"
          echo "📊 Available keys in $CONFIG_FILE:"
          jq -r 'keys | .[]' "$CONFIG_FILE"
          exit 1
        fi

        export AWS_ACCESS_KEY_ID
        export AWS_SECRET_ACCESS_KEY
        
        ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
        REMOTE_PATH="releases/${SOURCE_VERSION}/${{ inputs.file_name }}"
        
        echo "⬇️ Downloading ${REMOTE_PATH} from R2..."
        
        aws s3 cp \
          --endpoint-url ${ENDPOINT} \
          s3://${R2_BUCKET}/${REMOTE_PATH} \
          ${{ inputs.file_name }}

        echo "📦 Extracting archive..."
        unzip -qo ${{ inputs.file_name }}
        rm ${{ inputs.file_name }}
        
        echo "✅ R2 Asset Synchronization Complete."
