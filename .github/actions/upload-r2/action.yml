name: 'Upload to Cloudflare R2'
description: 'Centralized action to upload build artifacts to Cloudflare R2'

inputs:
  source:
    description: 'The file or directory to upload'
    required: true
  destination:
    description: 'The destination path in the R2 bucket'
    required: true

runs:
  using: "composite"
  steps:
    - name: Upload to R2
      uses: ryand56/r2-upload-action@latest
      with:
        r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
        r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
        r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        r2-bucket: ${{ secrets.R2_BUCKET }}
        source-dir: ${{ inputs.source }}
        destination-dir: ${{ inputs.destination }}
