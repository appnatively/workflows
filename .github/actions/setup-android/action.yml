inputs:
  java_version:
    description: 'Java version'
    required: false
    default: '17'

runs:
  using: "composite"
  steps:
    - name: Prebuild Android
      shell: bash
      run: npx expo prebuild --platform android --non-interactive
      working-directory: app

    - name: Setup Java
      uses: actions/setup-java@8df1039502a1d1f999990393b4fe85ee0bf0e20e # v4.5.0
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0bd81c133f6e0885d94e9140c2d130ed86381945 # v4.2.2
      with:
        cache-disabled: false

