inputs:
  java_version:
    description: 'Java version'
    required: false
    default: '17'
  build_id:
    description: 'Build ID'
    required: true
  build_access_token:
    description: 'Build Access Token'
    required: true
  api_url:
    description: 'API URL for the backend'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-disabled: false

    - name: Expo Prebuild
      shell: bash
      run: node ./scripts/prebuild-android.js
      working-directory: app

    - name: Configure Keystore & Signing
      shell: bash
      env:
        BUILD_ID: ${{ inputs.build_id }}
        API_URL: ${{ inputs.api_url }}
        BUILD_ACCESS_TOKEN: ${{ inputs.build_access_token }}
      run: node ./scripts/setup-keystore.js
      working-directory: app

    - name: Disable JS Bundling Tasks in build.gradle
      shell: bash
      run: |
        cat << 'EOF' >> app/build.gradle

        // Dynamically injected via GitHub Actions to skip JS bundling
        gradle.taskGraph.whenReady { taskGraph ->
            taskGraph.allTasks.each { task ->
                if (task.name.contains("createBundle") || task.name.contains("bundleReleaseJsAndAssets")) {
                    task.enabled = false
                }
            }
        }
        EOF
      working-directory: app/android
