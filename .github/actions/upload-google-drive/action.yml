name: 'Upload to Google Drive'
description: 'Upload build artifacts to Google Drive using a single consolidated JSON secret'

inputs:
  source:
    description: 'The file to upload'
    required: true
  build_id:
    description: 'The ID of the build'
    required: true
  appnatively_secrets:
    description: 'JSON string containing GOOGLE_DRIVE_CLIENT_ID, CLIENT_SECRET, REFRESH_TOKEN, and FOLDER_ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.11'

    - name: Upload to Google Drive (JS)
      shell: bash
      env:
        APPNATIVELY_SECRETS: ${{ inputs.appnatively_secrets }}
        FILE_PATH: ${{ inputs.source }}
        BUILD_ID: ${{ inputs.build_id }}
      run: |
        cd ${{ github.action_path }}
        
        # Install dependencies if not already present
        if [ ! -d "node_modules" ]; then
          pnpm init > /dev/null
          pnpm add googleapis > /dev/null
        fi
        
        # Run the script
        node upload.js
