name: 'Upload to Google Drive'
description: 'Upload build artifacts to Google Drive using a single consolidated JSON secret'

inputs:
  source:
    description: 'The file to upload'
    required: true
  build_id:
    description: 'The ID of the build'
    required: true
  pnpm_version:
    description: 'pnpm version'
    required: false
    default: '10'
  node_version:
    description: 'Node.js version'
    required: false
    default: '24.11'

runs:
  using: "composite"
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm_version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Upload to Google Drive (JS)
      shell: bash
      env:
        FILE_PATH: ${{ inputs.source }}
        BUILD_ID: ${{ inputs.build_id }}
      run: |
        cd ${{ github.action_path }}
        
        # Install dependencies with locked version for security
        if [ ! -d "node_modules" ]; then
          pnpm init > /dev/null
          pnpm add googleapis@171.4.0 > /dev/null
        fi
        
        # Run the script
        node upload.js
