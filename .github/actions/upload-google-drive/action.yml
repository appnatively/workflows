name: 'Upload to Google Drive'
description: 'Upload build artifacts to Google Drive using OAuth tokens'

inputs:
  source:
    description: 'The file to upload'
    required: true
  build_id:
    description: 'The ID of the build'
    required: true
  client_id:
    description: 'Google Drive Client ID'
    required: true
  client_secret:
    description: 'Google Drive Client Secret'
    required: true
  refresh_token:
    description: 'Google Drive Refresh Token'
    required: true
  folder_id:
    description: 'Google Drive Folder ID'
    required: true

runs:
  using: "composite"
  steps:
    - name: Upload to Google Drive (JS)
      shell: bash
      env:
        CLIENT_ID: ${{ inputs.client_id }}
        CLIENT_SECRET: ${{ inputs.client_secret }}
        REFRESH_TOKEN: ${{ inputs.refresh_token }}
        FOLDER_ID: ${{ inputs.folder_id }}
        FILE_PATH: ${{ inputs.source }}
        BUILD_ID: ${{ inputs.build_id }}
      run: |
        cd ${{ github.action_path }}
        
        # Install dependencies if not already present
        if [ ! -d "node_modules" ]; then
          pnpm init > /dev/null
          pnpm add googleapis > /dev/null
        fi
        
        # Run the script
        node upload.js
