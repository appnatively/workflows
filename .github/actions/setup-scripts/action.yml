name: 'Setup Build Scripts'
description: 'Makes the AppNatively build scripts available to the workflow'
runs:
  using: 'composite'
  steps:
    - name: Deploy Scripts to Workspace
      shell: bash
      run: |
        # This ensures that if a required script is missing, the build fails with a clear log entry.
        
        DEPLOY_DIRS="scripts"
        if [ -d "app" ]; then
          DEPLOY_DIRS="$DEPLOY_DIRS app/scripts"
        fi

        for DIR in $DEPLOY_DIRS; do
          echo "📂 Deploying scripts to $DIR..."
          mkdir -p "$DIR"
          
          # Explicitly copy required shell scripts
          cp "${{ github.action_path }}/setup-app-info.sh" "$DIR/"
          cp "${{ github.action_path }}/setup-assets.sh" "$DIR/"
          cp "${{ github.action_path }}/setup-firebase.sh" "$DIR/"
          
          # Explicitly copy required Node.js helpers
          cp "${{ github.action_path }}/sync-assets.js" "$DIR/"
          
          # Set execution permissions
          chmod +x "$DIR"/*.sh
        done
        
        echo "✅ Script deployment complete."
