name: 'Setup Build Scripts'
description: 'Makes the AppNatively build scripts available to the workflow'
runs:
  using: 'composite'
  steps:
    - name: Deploy Scripts to Workspace
      shell: bash
      run: |
        SCRIPTS_SRC="${{ github.action_path }}/../../scripts"
        ROOT_SRC="${{ github.action_path }}/../../.."

        DIR="scripts"
        echo "📂 Deploying scripts to $DIR..."
        mkdir -p "$DIR"

        # Deploy Gemfile and Fastlane configurations to workspace root
        echo "📂 Deploying Gemfile and Fastlane to workspace root..."
        cp "$ROOT_SRC/Gemfile" "./"
        if [ -f "$ROOT_SRC/Gemfile.lock" ]; then
          cp "$ROOT_SRC/Gemfile.lock" "./"
        fi
        if [ -d "$ROOT_SRC/fastlane" ]; then
          cp -R "$ROOT_SRC/fastlane" "./"
        fi

        # Deploy all helper/setup JavaScript files
        cp "$SCRIPTS_SRC"/*.js "$DIR/"

        echo "✅ Script deployment complete."
