name: 'Setup Build Scripts'
description: 'Makes build scripts available to the workflow'
runs:
  using: 'composite'
  steps:
    - name: Copy Scripts to Workspace
      shell: bash
      run: |
        # Copy to root scripts directory
        mkdir -p scripts
        cp ${{ github.action_path }}/*.sh scripts/
        chmod +x scripts/*.sh

        # Also copy to app/scripts if it exists, as many workflow steps run from there
        if [ -d "app" ]; then
          mkdir -p app/scripts
          cp ${{ github.action_path }}/*.sh app/scripts/
          chmod +x app/scripts/*.sh
        fi
