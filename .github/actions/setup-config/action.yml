name: 'Setup Build Configuration'
description: 'Fetches build-specific configuration and R2 storage credentials from the AppNatively API'

inputs:
  api_url:
    description: 'The backend bootstrap URL'
    required: true
  build_id:
    description: 'The current build ID'
    required: true
  build_access_token:
    description: 'The raw build access token for authentication'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Fetch and Mask Configuration
      shell: bash
      env:
        BUILD_ID: ${{ inputs.build_id }}
        API_URL: ${{ inputs.api_url }}
        BUILD_TOKEN: ${{ inputs.build_access_token }}
      run: |
        if [ -z "$BUILD_TOKEN" ]; then
          echo "❌ BUILD_ACCESS_TOKEN is missing."
          exit 1
        fi
        
        echo "📡 Fetching build configuration..."
        if ! curl -sf -H "Authorization: Bearer ${BUILD_TOKEN}" "${API_URL}/api/builds/${BUILD_ID}/config" -o app_config.json; then
          echo "❌ Failed to fetch configuration from API."
          exit 1
        fi

        if [ ! -s app_config.json ]; then
          echo "❌ Configuration file is empty or missing."
          exit 1
        fi

        echo "📊 Fetched Configuration (Sanitized):"
        jq 'del(.r2_access_key_id, .r2_secret_access_key, .google_drive_access_token, .google_drive_refresh_token, .google_drive_client_id, .google_drive_client_secret)' app_config.json

        echo "🔐 Masking sensitive configuration data..."
        
        # Define keys to mask in a whitelist
        # SENSITIVE_KEYS=(
        #   "r2_access_key_id"
        #   "r2_secret_access_key"
        #   "google_drive_access_token"
        #   "google_drive_refresh_token"
        #   "google_drive_client_id"
        #   "google_drive_client_secret"
        # )

        # for key in "${SENSITIVE_KEYS[@]}"; do
        #   VALUE=$(jq -r ".$key // empty" app_config.json)
        #   if [ -n "$VALUE" ] && [ "$VALUE" != "null" ]; then
        #     echo "::add-mask::$VALUE"
        #   fi
        # done
        
        echo "✅ Configuration fetched and runtime masking complete."

