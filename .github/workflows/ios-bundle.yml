name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true


jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Setup Configuration
        id: config
        uses: appnatively/workflows/.github/actions/setup-config@master
        with:
          api_url: ${{ inputs.api_url }}
          build_id: ${{ github.event.inputs.build_id || inputs.build_id }}
          build_access_token: ${{ secrets.BUILD_ACCESS_TOKEN }}

      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup App Info (Dynamic Package ID and App Name)
        run: ./scripts/setup-app-info.sh
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
        working-directory: app

      - name: Get iOS Project Name
        id: ios-name
        run: |
          if [ -f app/.ios_project_name ]; then
            echo "name=$(cat app/.ios_project_name)" >> $GITHUB_OUTPUT
          else
            echo "name=AppNativelyApp" >> $GITHUB_OUTPUT
          fi

      - name: Setup Mobile Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}

      - name: Download App Assets & Inject Dynamic Environment Variables
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          ./scripts/setup-assets.sh

          echo "📖 Discovering app configuration..."
          API_URL=$(jq -r '.expo_public_api_url' ../app_config.json)
          APP_ID=$(jq -r '.expo_public_app_id' ../app_config.json)

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          echo "✅ Injecting EXPO_PUBLIC_APP_ID=${APP_ID}"
          sed -i.bak "s|__PLACEHOLDER_EXPO_PUBLIC_APP_ID__|${APP_ID}|g" ios/main.jsbundle && rm ios/main.jsbundle.bak
          
          echo "✅ Injecting EXPO_PUBLIC_API_URL=${API_URL}"
          sed -i.bak "s|__PLACEHOLDER_EXPO_PUBLIC_API_URL__|${API_URL}|g" ios/main.jsbundle && rm ios/main.jsbundle.bak

          # 0. Setup Firebase (fetch and run from workflows repo)
          echo "🔥 Setting up Firebase..."
          ./scripts/setup-firebase.sh
        shell: bash
        working-directory: app

      - name: Build iOS Archive (Unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
            -scheme ${{ steps.ios-name.outputs.name }} \
            -configuration Release \
            -archivePath build/${{ steps.ios-name.outputs.name }}.xcarchive \
            SKIP_BUNDLING=1 \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" | xcpretty
        working-directory: app/ios

      - name: Create IPA (Unsigned Payload)
        run: |
          mkdir -p Payload
          cp -r build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications/*.app Payload/
          zip -r ${{ steps.ios-name.outputs.name }}.ipa Payload
        working-directory: app/ios

      - name: Inject Pre-built JS and Zip Archive
        run: |
          APP_PATH=$(find build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications -name "*.app" -type d -maxdepth 1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          
          cp main.jsbundle "$APP_PATH/"
          if [ -d "assets" ]; then cp -R assets "$APP_PATH/"; fi

          zip -r ../../app-ios-archive.zip build/${{ steps.ios-name.outputs.name }}.xcarchive
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🍎 iOS Build Summary'
          metric_name: 'Archive Size'
          file_path: 'app-ios-archive.zip'
          platform: 'iOS'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app-ios-archive.zip
          build_id: ${{ inputs.build_id }}

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app_config.json || true
          echo "✅ Sanitization complete."