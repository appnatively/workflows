name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'


jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}


      - name: Build iOS Archive (Unsigned)
        run: |
          xcodebuild archive \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -archivePath build/app.xcarchive \
            SKIP_BUNDLING=1 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
        working-directory: app/ios

      - name: Inject Pre-built JS and Zip Archive
        run: |
          # 1. Find the .app bundle inside the generated xcarchive
          APP_PATH=$(find build/app.xcarchive/Products/Applications -name "*.app" -type d -maxdepth 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Could not find .app directory inside the archive!"
            exit 1
          fi
          
          echo "✅ Found app inside archive at: $APP_PATH"

          # 2. Inject the pre-built JS bundle and assets directly into the .app
          # (Ensure the paths to main.jsbundle and assets align with your download-r2 output)
          echo "📦 Copying pre-built bundle and assets into .app..."
          cp main.jsbundle "$APP_PATH/"
          
          if [ -d "assets" ]; then
            cp -R assets "$APP_PATH/"
          fi

          # 3. Zip the completely assembled archive
          echo "🗜️ Zipping iOS archive..."
          zip -r ../../app-ios-archive.zip build/app.xcarchive
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🍎 iOS Build Summary'
          metric_name: 'Archive Size'
          file_path: 'app-ios-archive.zip'
          platform: 'iOS'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app-ios-archive.zip