name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      pnpm_version:
        required: false
        type: string
        default: '10'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-15
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Configuration
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ./scripts/setup-config.js
        shell: bash

      - name: Download from R2
        run: node ./scripts/download-r2.js
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --filter "./app" --filter "./sdk"
        shell: bash

      - name: Install hermes-compiler
        run: |
          mkdir -p ./hermes-install
          cd ./hermes-install
          pnpm init
          pnpm add --ignore-workspace hermes-compiler@0.14.1
        shell: bash

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ../scripts/setup-assets.js

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          node ../scripts/inject-env.js ios/main.jsbundle

          echo "⚡ Compiling main.jsbundle to Hermes Bytecode..."
          HERMESC=../hermes-install/node_modules/hermes-compiler/hermesc/osx-bin/hermesc
          if [ -z "$HERMESC" ] || [ ! -f "$HERMESC" ]; then
            echo "❌ Error: hermesc binary not found at $HERMESC"
            exit 1
          fi
          chmod +x "$HERMESC"
          "$HERMESC" \
            -emit-binary \
            -w \
            -out ios/main.jsbundle \
            ios/main.jsbundle

          echo "📱 Setting up App Info..."
          node ../scripts/setup-app-info.js

          echo "🔥 Setting up Firebase..."
          node ../scripts/setup-firebase.js ios
        shell: bash
        working-directory: app

      # Step 1: Backup pre-generated EXUpdates.bundle before prebuild deletes it
      - name: Backup expo-updates Bundle
        shell: bash
        run: |
          if [ -d "app/ios/EXUpdates.bundle" ]; then
            cp -R app/ios/EXUpdates.bundle ./EXUpdates.bundle.tmp
            echo "✅ Backed up EXUpdates.bundle"
          fi

      - name: Expo Prebuild
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node ../scripts/prebuild-ios.js
        shell: bash
        working-directory: app

      # Step 2: Restore EXUpdates.bundle after prebuild finishes
      - name: Restore expo-updates Bundle
        shell: bash
        run: |
          if [ -d "./EXUpdates.bundle.tmp" ]; then
            mkdir -p app/ios
            cp -R ./EXUpdates.bundle.tmp app/ios/EXUpdates.bundle
            rm -rf ./EXUpdates.bundle.tmp
            echo "✅ Restored EXUpdates.bundle"
          fi

      - name: Get iOS Project Name
        id: ios-name
        shell: bash
        run: |
          cd app/ios
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT" ]; then
            NAME=$(basename "$PROJECT" .xcodeproj)
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "✅ Found iOS Project Name: $NAME"
          else
            echo "❌ Error: No .xcodeproj found in app/ios folder!"
            exit 1
          fi

      - name: Configure iOS Signing
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ../scripts/setup-ios-signing.js
        shell: bash
        working-directory: app


      - name: Patch React Native Xcode Script
        shell: bash
        run: |
          echo "Bypassing expo-updates script phase..."
          mkdir -p node_modules/expo-updates/scripts
          echo "echo 'Bypassing updates script phase'" > node_modules/expo-updates/scripts/create-updates-resources-ios.sh
          chmod +x node_modules/expo-updates/scripts/create-updates-resources-ios.sh

          cat << 'EOF' > patch-script.sh
          #!/bin/bash
          set -e
          DEST="$CONFIGURATION_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          SRC_DIR="."

          echo "🚚 [Pipeline Patch] Injecting pre-built JS bundle and assets..."

          if [ -f "$SRC_DIR/main.jsbundle" ]; then
            cp "$SRC_DIR/main.jsbundle" "$DEST/main.jsbundle"
            echo "✅ Successfully injected main.jsbundle"
          else
            echo "❌ Error: Pre-built main.jsbundle not found in $SRC_DIR"
            exit 1
          fi

          if [ -d "$SRC_DIR/assets" ]; then
            # Clean old assets if any exist to prevent caching stale items
            rm -rf "$DEST/assets"
            cp -R "$SRC_DIR/assets" "$DEST/"
            echo "✅ Successfully injected assets"
          fi

          # Inject EXUpdates.bundle into build directory
          if [ -d "$SRC_DIR/EXUpdates.bundle" ]; then
            rm -rf "$CONFIGURATION_BUILD_DIR/EXUpdates.bundle"
            cp -R "$SRC_DIR/EXUpdates.bundle" "$CONFIGURATION_BUILD_DIR/"
            echo "✅ Successfully injected EXUpdates.bundle"
          fi

          echo "🎉 Pre-built resources successfully staged for Xcode packaging."
          exit 0
          EOF

          echo "✍️ Overwriting React Native script..."
          cp patch-script.sh node_modules/react-native/scripts/react-native-xcode.sh
          
          echo "✍️ Overwriting Expo script..."
          cp patch-script.sh node_modules/expo/scripts/react-native-xcode.sh
          
          rm patch-script.sh

      - name: Build & Export IPA (via Fastlane)
        run: |
          cp -R ../../fastlane ./fastlane
          bundle exec fastlane ios build_saas_app \
            archive_path:"build/${{ steps.ios-name.outputs.name }}.xcarchive" \
            scheme_name:"${{ steps.ios-name.outputs.name }}" \
            cert_path:"$IOS_CERTIFICATE_PATH" \
            profile_path:"$IOS_PROVISIONING_PROFILE_PATH" \
            bundle_id:"$IOS_BUNDLE_ID" \
            method:"${IOS_DISTRIBUTION_METHOD:-app-store}"
        working-directory: app/ios
        env:
          BUNDLE_GEMFILE: ../../Gemfile

      - name: Generate Missing dSYMs for Dynamic Frameworks
        run: |
          APP_PATH="build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications/${{ steps.ios-name.outputs.name }}.app"
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"
          DSYMS_DIR="build/${{ steps.ios-name.outputs.name }}.xcarchive/dSYMs"
          mkdir -p "$DSYMS_DIR"

          if [ -d "$FRAMEWORKS_DIR" ]; then
            echo "🛠️ Generating missing dSYMs for prebuilt frameworks..."
            for fw in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -d "$fw" ]; then
                FW_NAME=$(basename "$fw" .framework)
                FW_BINARY="$fw/$FW_NAME"
                if [ -f "$FW_BINARY" ]; then
                  DSYM_PATH="$DSYMS_DIR/$FW_NAME.framework.dSYM"
                  if [ ! -d "$DSYM_PATH" ]; then
                    echo "📦 Generating dSYM for $FW_NAME..."
                    dsymutil "$FW_BINARY" -o "$DSYM_PATH" 2>/dev/null || true
                  fi
                fi
              fi
            done
          else
            echo "⚠️ No Frameworks directory found inside the app bundle."
          fi
        working-directory: app/ios
        shell: bash

      - name: Zip Archive
        run: |
          zip -r ../../app-ios-archive.zip build/${{ steps.ios-name.outputs.name }}.xcarchive
        working-directory: app/ios

      - name: Upload to Google Drive
        env:
          FILE_PATH: app-ios-archive.zip
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          cd ./scripts
          if [ ! -d "node_modules" ]; then
            pnpm init > /dev/null
            pnpm add googleapis@171.4.0 > /dev/null
          fi
          node upload-google-drive.js
        shell: bash

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files and dynamic signing assets..."
          rm -f app_config.json || true
          rm -f app/app_config.json || true
          if [ -n "$IOS_CERTIFICATE_PATH" ]; then
            rm -f "$IOS_CERTIFICATE_PATH" || true
          fi
          if [ -n "$IOS_PROVISIONING_PROFILE_PATH" ]; then
            rm -f "$IOS_PROVISIONING_PROFILE_PATH" || true
          fi
          if [ -n "$APP_STORE_CONNECT_KEY_FILEPATH" ]; then
            rm -f "$APP_STORE_CONNECT_KEY_FILEPATH" || true
          fi
          echo "APP_STORE_CONNECT_KEY_ID=" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_ISSUER_ID=" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_KEY_FILEPATH=" >> $GITHUB_ENV
          echo "APP_BUILD_CHANGELOG=" >> $GITHUB_ENV
          echo "✅ Sanitization complete."