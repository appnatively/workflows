name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      pnpm_version:
        required: false
        type: string
        default: '10'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Configuration
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ./scripts/setup-config.js
        shell: bash

      - name: Download from R2
        run: node ./scripts/download-r2.js
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: false

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --filter "./app" --filter "./sdk"
        shell: bash

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ../scripts/setup-assets.js

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          node ../scripts/inject-env.js ios/main.jsbundle

          echo "📱 Setting up App Info..."
          node ../scripts/setup-app-info.js

          echo "🔥 Setting up Firebase..."
          node ../scripts/setup-firebase.js
        shell: bash
        working-directory: app

      - name: Expo Prebuild
        run: node ../scripts/prebuild-ios.js
        shell: bash
        working-directory: app

      - name: Get iOS Project Name
        id: ios-name
        shell: bash
        run: |
          cd app/ios
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT" ]; then
            NAME=$(basename "$PROJECT" .xcodeproj)
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "✅ Found iOS Project Name: $NAME"
          else
            echo "❌ Error: No .xcodeproj found in app/ios folder!"
            exit 1
          fi

      - name: Configure iOS Signing
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ../scripts/setup-ios-signing.js
        shell: bash
        working-directory: app

      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Build Formatter
        run: gem install xcbeautify --no-document
        shell: bash

      - name: Verify Pods Folder
        shell: bash
        run: |
          if [ ! -d "Pods" ]; then
            echo "Error: Pods folder not found!"
            exit 1
          fi
          echo "Pods folder verified successfully."
        working-directory: app/ios

      - name: Build iOS Archive
        run: |
          set -o pipefail
          if [ -n "$IOS_PROVISIONING_PROFILE_UUID" ]; then
            echo "🏗️ Building SIGNED iOS Archive..."
            xcodebuild archive \
              -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
              -scheme ${{ steps.ios-name.outputs.name }} \
              -configuration Release \
              -archivePath build/${{ steps.ios-name.outputs.name }}.xcarchive \
              SKIP_BUNDLING=1 \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=YES \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGN_STYLE=Manual \
              PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_UUID" \
              DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
              CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" | xcbeautify
          else
            echo "🏗️ Building UNSIGNED iOS Archive..."
            xcodebuild archive \
              -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
              -scheme ${{ steps.ios-name.outputs.name }} \
              -configuration Release \
              -archivePath build/${{ steps.ios-name.outputs.name }}.xcarchive \
              SKIP_BUNDLING=1 \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_ENTITLEMENTS="" \
              CODE_SIGNING_IDENTITY="" | xcbeautify
          fi
        working-directory: app/ios

      - name: Inject Pre-built JS and Zip Archive
        run: |
          APP_PATH=$(find build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications -name "*.app" -type d -maxdepth 1)
          if [ -z "$APP_PATH" ]; then exit 1; fi

          cp main.jsbundle "$APP_PATH/"
          if [ -d "assets" ]; then cp -R assets "$APP_PATH/"; fi

          zip -r ../../app-ios-archive.zip build/${{ steps.ios-name.outputs.name }}.xcarchive
        working-directory: app/ios

      - name: Create IPA
        run: |
          if [ -n "$IOS_PROVISIONING_PROFILE_UUID" ]; then
            echo "📦 Generating SIGNED IPA..."
            echo '<?xml version="1.0" encoding="UTF-8"?>' > ExportOptions.plist
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ExportOptions.plist
            echo '<plist version="1.0">' >> ExportOptions.plist
            echo '<dict>' >> ExportOptions.plist
            echo '    <key>method</key>' >> ExportOptions.plist
            echo "    <string>${IOS_DISTRIBUTION_METHOD:-app-store}</string>" >> ExportOptions.plist
            echo '    <key>teamID</key>' >> ExportOptions.plist
            echo "    <string>${IOS_TEAM_ID}</string>" >> ExportOptions.plist
            echo '    <key>signingStyle</key>' >> ExportOptions.plist
            echo '    <string>manual</string>' >> ExportOptions.plist
            echo '    <key>provisioningProfiles</key>' >> ExportOptions.plist
            echo '    <dict>' >> ExportOptions.plist
            echo "        <key>${IOS_BUNDLE_ID}</key>" >> ExportOptions.plist
            echo "        <string>${IOS_PROVISIONING_PROFILE_UUID}</string>" >> ExportOptions.plist
            echo '    </dict>' >> ExportOptions.plist
            echo '</dict>' >> ExportOptions.plist
            echo '</plist>' >> ExportOptions.plist

            xcodebuild -exportArchive \
              -archivePath build/${{ steps.ios-name.outputs.name }}.xcarchive \
              -exportPath build \
              -exportOptionsPlist ExportOptions.plist | xcbeautify
            
            cp build/*.ipa ${{ steps.ios-name.outputs.name }}.ipa || true
          else
            echo "📦 Generating UNSIGNED IPA (Payload Zip)..."
            mkdir -p Payload
            cp -r build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications/*.app Payload/
            zip -r ${{ steps.ios-name.outputs.name }}.ipa Payload
          fi
        working-directory: app/ios



      - name: Upload to Google Drive
        env:
          FILE_PATH: app-ios-archive.zip
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          cd ./scripts
          if [ ! -d "node_modules" ]; then
            pnpm init > /dev/null
            pnpm add googleapis@171.4.0 > /dev/null
          fi
          node upload-google-drive.js
        shell: bash

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app_config.json || true
          if [ -n "$IOS_KEYCHAIN_PATH" ]; then
            echo "🔐 Deleting temporary signing keychain..."
            security delete-keychain "$IOS_KEYCHAIN_PATH" || true
          fi
          if [ -n "$IOS_PROVISIONING_PROFILE_UUID" ]; then
            echo "🔐 Deleting temporary provisioning profile..."
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${IOS_PROVISIONING_PROFILE_UUID}.mobileprovision" || true
          fi
          echo "✅ Sanitization complete."