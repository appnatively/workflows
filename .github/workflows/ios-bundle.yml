name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      pnpm_version:
        required: false
        type: string
        default: '10'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true


jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_26.app
        shell: bash

      - name: Setup Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Configuration
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ./scripts/setup-config.js
        shell: bash

      - name: Download from R2
        run: node ./scripts/download-r2.js
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --filter "./app" --filter "./sdk"
        shell: bash

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ./scripts/setup-assets.js

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          node ./scripts/inject-env.js ios/main.jsbundle

          echo "📱 Setting up App Info..."
          node ./scripts/setup-app-info.js

          echo "🔥 Setting up Firebase..."
          node ./scripts/setup-firebase.js
        shell: bash
        working-directory: app

      - name: Get iOS Project Name
        id: ios-name
        run: |
          if [ -f app/.ios_project_name ]; then
            echo "name=$(cat app/.ios_project_name)" >> $GITHUB_OUTPUT
          else
            echo "name=AppNativelyApp" >> $GITHUB_OUTPUT
          fi

      - name: Expo Prebuild
        run: node ./scripts/prebuild-ios.js
        shell: bash
        working-directory: app

      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true

      - name: Install Pods
        run: |
          gem install xcpretty --no-document
          pod install
        shell: bash
        working-directory: app/ios

      - name: Verify Pods Folder
        shell: bash
        run: |
          if [ ! -d "Pods" ]; then
            echo "Error: Pods folder not found!"
            exit 1
          fi
          echo "Pods folder verified successfully."
        working-directory: app/ios

      - name: Build iOS Archive (Unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
            -scheme ${{ steps.ios-name.outputs.name }} \
            -configuration Release \
            -archivePath build/${{ steps.ios-name.outputs.name }}.xcarchive \
            SKIP_BUNDLING=1 \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" | xcpretty
        working-directory: app/ios

      - name: Create IPA (Unsigned Payload)
        run: |
          mkdir -p Payload
          cp -r build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications/*.app Payload/
          zip -r ${{ steps.ios-name.outputs.name }}.ipa Payload
        working-directory: app/ios

      - name: Inject Pre-built JS and Zip Archive
        run: |
          APP_PATH=$(find build/${{ steps.ios-name.outputs.name }}.xcarchive/Products/Applications -name "*.app" -type d -maxdepth 1)
          if [ -z "$APP_PATH" ]; then exit 1; fi

          cp main.jsbundle "$APP_PATH/"
          if [ -d "assets" ]; then cp -R assets "$APP_PATH/"; fi

          zip -r ../../app-ios-archive.zip build/${{ steps.ios-name.outputs.name }}.xcarchive
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        env:
          SUMMARY_TITLE: '🍎 iOS Build Summary'
          SUMMARY_METRIC: 'Archive Size'
          SUMMARY_FILE: 'app-ios-archive.zip'
          SUMMARY_PLATFORM: 'iOS'
          SUMMARY_BUILD_ID: ${{ inputs.build_id }}
        run: node ./scripts/generate-summary.js
        shell: bash

      - name: Upload to Google Drive
        env:
          FILE_PATH: app-ios-archive.zip
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          cd ./scripts
          if [ ! -d "node_modules" ]; then
            pnpm init > /dev/null
            pnpm add googleapis@171.4.0 > /dev/null
          fi
          node upload-google-drive.js
        shell: bash

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app_config.json || true
          echo "✅ Sanitization complete."