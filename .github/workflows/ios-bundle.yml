name: iOS Production Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'


jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout Actions
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github

      - name: Download from R2
        uses: ./.github/actions/download-r2

      - name: Setup Environment
        uses: ./.github/actions/setup-mobile
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}


      - name: Build iOS Archive (Unsigned)
        run: |
          xcodebuild archive \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -archivePath build/app.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
        working-directory: app/ios

      - name: Zip Archive
        run: |
          zip -r ../../app-ios-archive.zip build/app.xcarchive
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: ./.github/actions/generate-summary
        with:
          title: '🍎 iOS Build Summary'
          metric_name: 'Archive Size'
          file_path: 'app-ios-archive.zip'
          platform: 'iOS'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Cloudflare R2
        uses: ./.github/actions/upload-r2
        with:
          source: app-ios-archive.zip
          destination: builds/${{ inputs.build_id }}/app-ios-archive.zip