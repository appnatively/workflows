name: OTA Publish

on:
  workflow_call:
    inputs:
      ota_update_id:
        required: true
        type: string
      api_url:
        required: true
        type: string
      platform:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

jobs:
  # ── Android (ubuntu-latest, linux64 hermesc) ─────────────────────────────
  android:
    name: Android OTA Bundle
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    env:
      OTA_UPDATE_ID: ${{ inputs.ota_update_id }}
      API_URL: ${{ inputs.api_url }}
      BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
      PLATFORM: android
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup OTA Config
        run: node ./scripts/setup-ota-config.js

      - name: Download Source Bundle from R2
        run: node ./scripts/download-r2.js

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install hermes-compiler
        run: |
          mkdir -p ./hermes-install
          cd ./hermes-install
          pnpm init
          pnpm add hermes-compiler@0.14.1

      - name: Inject Env & Compile to Hermes (Android)
        run: |
          BUNDLE=app/android/app/src/main/assets/index.android.bundle
          echo "💉 Injecting env vars..."
          node ./scripts/inject-env.js "$BUNDLE"
          echo "⚡ Compiling to Hermes bytecode (linux64)..."
          HERMESC=$(find -L ./hermes-install -name hermesc -path '*/linux64-bin/*' | head -n 1)
          if [ -z "$HERMESC" ]; then
            echo "❌ Error: hermesc binary not found"
            exit 1
          fi
          chmod +x "$HERMESC"
          "$HERMESC" -emit-binary -w -out "$BUNDLE" "$BUNDLE"

      - name: Generate OTA Metadata
        run: node ./scripts/generate-ota-metadata.js

      - name: Upload OTA Bundle
        run: node ./scripts/upload-ota.js

      - name: Report Failure to Backend
        if: failure()
        run: node ./scripts/report-ota-failure.js "Android OTA bundle job failed"

      - name: Security Cleanup
        if: always()
        run: rm -f app_config.json || true

  # ── iOS (macos-15, osx hermesc) ──────────────────────────────────────────
  ios:
    name: iOS OTA Bundle
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-15
    env:
      OTA_UPDATE_ID: ${{ inputs.ota_update_id }}
      API_URL: ${{ inputs.api_url }}
      BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
      PLATFORM: ios
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup OTA Config
        run: node ./scripts/setup-ota-config.js

      - name: Download Source Bundle from R2
        run: node ./scripts/download-r2.js

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install hermes-compiler
        run: |
          mkdir -p ./hermes-install
          cd ./hermes-install
          pnpm init
          pnpm add hermes-compiler@0.14.1

      - name: Inject Env & Compile to Hermes (iOS)
        run: |
          BUNDLE=app/ios/main.jsbundle
          echo "💉 Injecting env vars..."
          node ./scripts/inject-env.js "$BUNDLE"
          echo "⚡ Compiling to Hermes bytecode (osx)..."
          HERMESC=$(find -L ./hermes-install -name hermesc -path '*/osx-bin/*' | head -n 1)
          if [ -z "$HERMESC" ]; then
            echo "❌ Error: hermesc binary not found"
            exit 1
          fi
          chmod +x "$HERMESC"
          "$HERMESC" -emit-binary -w -out "$BUNDLE" "$BUNDLE"

      - name: Generate OTA Metadata
        run: node ./scripts/generate-ota-metadata.js

      - name: Upload OTA Bundle
        run: node ./scripts/upload-ota.js

      - name: Report Failure to Backend
        if: failure()
        run: node ./scripts/report-ota-failure.js "iOS OTA bundle job failed"

      - name: Security Cleanup
        if: always()
        run: rm -f app_config.json || true
