name: Android Production APK

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'


jobs:
  build-android-release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          android: true
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}


      - name: Build Release APK (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -x bundleReleaseJsAndAssets \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '📱 Build Summary'
          metric_name: 'APK Size'
          file_path: 'app/android/app/build/outputs/apk/release/app-release.apk'
          platform: 'Android'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Cloudflare R2
        uses: appnatively/workflows/.github/actions/upload-r2@master
        with:
          source: app/android/app/build/outputs/apk/release/app-release.apk
          destination: builds/${{ inputs.build_id }}/app-release.apk
