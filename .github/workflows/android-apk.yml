name: Android Production APK

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'
      pnpm_version:
        required: false
        type: string
        default: '10'
    secrets:
      APPNATIVELY_SECRETS:
        required: true


jobs:
  build-android-release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          android: true
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          pnpm_version: ${{ inputs.pnpm_version }}


      # 📦 Verify bundle exists (optional but recommended)
      - name: Verify Pre-built JS Bundle
        run: |
          if [ ! -f "android/app/src/main/assets/index.android.bundle" ]; then
            echo "❌ Pre-built JS bundle not found at android/app/src/main/assets/index.android.bundle"
            echo "Please ensure the bundle is included in the downloaded artifacts from R2"
            exit 1
          fi
          echo "✅ Pre-built JS bundle found"
        working-directory: app

      - name: Fetch App Configuration
        env:
          BUILD_ID: ${{ inputs.build_id }}
          SECRETS_JSON: ${{ secrets.APPNATIVELY_SECRETS }}
        run: |
          API_URL=$(echo "$SECRETS_JSON" | jq -r '.EXPO_PUBLIC_API_URL // empty')
          if [ -z "$API_URL" ]; then
            echo "❌ EXPO_PUBLIC_API_URL not found in secrets."
            exit 1
          fi
          echo "📡 Fetching config from ${API_URL}/mobile-app/builds/${BUILD_ID}/config"
          curl -s "${API_URL}/mobile-app/builds/${BUILD_ID}/config" > app_config.json
        working-directory: app

      - name: Download App Assets & Inject Dynamic Environment Variables
        env:
          BUILD_ID: ${{ inputs.build_id }}
          SECRETS_JSON: ${{ secrets.APPNATIVELY_SECRETS }}

        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          ./scripts/setup-assets.sh

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          for var in EXPO_PUBLIC_APP_ID EXPO_PUBLIC_API_URL; do
            VALUE=$(echo "$SECRETS_JSON" | jq -r ".$var // empty")
            if [ -n "$VALUE" ]; then
              echo "✅ Injecting $var"
              sed -i "s|__PLACEHOLDER_${var}__|${VALUE}|g" android/app/src/main/assets/index.android.bundle
            else
              echo "⚠️ $var not found in secrets, skipping replacement"
            fi
          done

          # 0. Setup App Info (Dynamic Package ID & App Name)
          echo "📱 Setting up App Info..."
          ./scripts/setup-app-info.sh

          # 0. Setup Firebase (fetch and run from workflows repo)
          echo "🔥 Setting up Firebase..."
          ./scripts/setup-firebase.sh
        working-directory: app

      # 🏗️ Build APK without re-bundling JavaScript
      - name: Build Release APK (unsigned) - Using Pre-built Bundle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '📱 Build Summary'
          metric_name: 'APK Size'
          file_path: 'app/android/app/build/outputs/apk/release/app-release.apk'
          platform: 'Android'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app/android/app/build/outputs/apk/release/app-release.apk
          build_id: ${{ inputs.build_id }}
          appnatively_secrets: ${{ secrets.APPNATIVELY_SECRETS }}
