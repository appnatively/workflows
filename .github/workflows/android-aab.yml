name: Android Production AAB (App Bundle)

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'


jobs:
  build-android-bundle:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: ./.github/actions/download-r2

      - name: Setup Environment
        uses: ./.github/actions/setup-mobile
        with:
          android: true
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}


      - name: Build Release AAB (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Generate Job Summary
        if: always()
        uses: ./.github/actions/generate-summary
        with:
          title: '📦 AAB Build Summary'
          metric_name: 'AAB Size'
          file_path: 'app/android/app/build/outputs/bundle/release/app-release.aab'
          platform: 'Android'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Cloudflare R2
        uses: ./.github/actions/upload-r2
        with:
          source: app/android/app/build/outputs/bundle/release/app-release.aab
          destination: builds/${{ inputs.build_id }}/app-release.aab


