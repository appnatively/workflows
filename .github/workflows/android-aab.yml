name: Android Production AAB (App Bundle)

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true


jobs:
  build-android-bundle:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Setup Configuration
        id: config
        uses: appnatively/workflows/.github/actions/setup-config@master
        with:
          api_url: ${{ inputs.api_url }}
          build_id: ${{ inputs.build_id }}
          build_access_token: ${{ secrets.BUILD_ACCESS_TOKEN }}

      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          android: true
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}

      - name: Download App Assets & Inject Dynamic Environment Variables
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          ./scripts/setup-assets.sh

          echo "📖 Discovering app configuration..."
          API_URL=$(jq -r '.expo_public_api_url' app_config.json)
          APP_ID=$(jq -r '.expo_public_app_id' app_config.json)

          echo "💉 Injecting dynamic environment variables into JS bundle..."
          echo "✅ Injecting EXPO_PUBLIC_APP_ID=${APP_ID}"
          sed -i "s|__PLACEHOLDER_EXPO_PUBLIC_APP_ID__|${APP_ID}|g" android/app/src/main/assets/index.android.bundle
          
          echo "✅ Injecting EXPO_PUBLIC_API_URL=${API_URL}"
          sed -i "s|__PLACEHOLDER_EXPO_PUBLIC_API_URL__|${API_URL}|g" android/app/src/main/assets/index.android.bundle

          # 0. Setup App Info (Dynamic Package ID & App Name)
          echo "📱 Setting up App Info..."
          ./scripts/setup-app-info.sh

          # 0. Setup Firebase (fetch and run from workflows repo)
          echo "🔥 Setting up Firebase..."
          ./scripts/setup-firebase.sh
        working-directory: app


      - name: Build Release AAB (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '📦 AAB Build Summary'
          metric_name: 'AAB Size'
          file_path: 'app/android/app/build/outputs/bundle/release/app-release.aab'
          platform: 'Android'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app/android/app/build/outputs/bundle/release/app-release.aab
          build_id: ${{ inputs.build_id }}


      - name: Security Sanitization: Cleanup Configuration
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app/app_config.json || true
          echo "✅ Sanitization complete."
