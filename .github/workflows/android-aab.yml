name: Android Production AAB (App Bundle)

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'
      pnpm_version:
        required: false
        type: string
        default: '10'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

jobs:
  build-android-bundle:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Configuration
        env:
          BUILD_ID: ${{ inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ./scripts/setup-config.js
        shell: bash

      - name: Download from R2
        run: node ./scripts/download-r2.js
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --filter "./app"
        shell: bash

      - name: Install hermes-compiler
        run: |
          mkdir -p ./hermes-install
          cd ./hermes-install
          pnpm init
          pnpm add --ignore-workspace hermes-compiler@0.14.1
        shell: bash

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ../scripts/setup-assets.js

          echo "⚡ Compiling index.android.bundle to Hermes Bytecode..."
          HERMESC=../hermes-install/node_modules/hermes-compiler/hermesc/linux64-bin/hermesc
          if [ -z "$HERMESC" ] || [ ! -f "$HERMESC" ]; then
            echo "❌ Error: hermesc binary not found at $HERMESC"
            exit 1
          fi
          chmod +x "$HERMESC"
          "$HERMESC" \
            -emit-binary \
            -w \
            -out android/app/src/main/assets/index.android.bundle \
            android/app/src/main/assets/index.android.bundle

          echo "📱 Setting up App Info..."
          node ../scripts/setup-app-info.js

          echo "🔥 Setting up Firebase..."
          node ../scripts/setup-firebase.js android
        shell: bash
        working-directory: app

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: false

      - name: Expo Prebuild
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node ../scripts/prebuild-android.js
        shell: bash
        working-directory: app

      - name: Configure Keystore & Signing
        env:
          BUILD_ID: ${{ inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ../scripts/setup-keystore.js
        shell: bash
        working-directory: app

      - name: Setup Play Console Connection
        env:
          BUILD_ID: ${{ inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ../scripts/setup-play-store.js
        shell: bash
        working-directory: app

      - name: Disable JS Bundling Tasks in build.gradle
        shell: bash
        run: |
          cat << 'EOF' >> app/build.gradle

          // Dynamically injected via GitHub Actions to skip JS bundling, updates generation, and linting
          gradle.taskGraph.whenReady { taskGraph ->
              taskGraph.allTasks.each { task ->
                  if (task.name.contains("createBundle") || 
                      task.name.contains("bundleReleaseJsAndAssets") || 
                      task.name.contains("UpdatesResources") || 
                      task.name.toLowerCase().contains("lint")) {
                      task.enabled = false
                  }
              }
          }
          EOF
        working-directory: app/android

      - name: Build Release AAB (Signed)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4608m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Upload to Play Console (via Fastlane)
        if: env.ANDROID_PUBLISH_JSON_PATH != ''
        run: |
          cp -R ../../fastlane ./fastlane
          bundle exec fastlane android upload_play_store \
            aab_path:"app/build/outputs/bundle/release/app-release.aab" \
            package_name:"$ANDROID_PACKAGE_NAME"
        working-directory: app/android
        env:
          BUNDLE_GEMFILE: ../../Gemfile

      - name: Upload to Google Drive
        env:
          FILE_PATH: app/android/app/build/outputs/bundle/release/app-release.aab
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          cd ./scripts
          if [ ! -d "node_modules" ]; then
            pnpm init > /dev/null
            pnpm add googleapis@171.4.0 > /dev/null
          fi
          node upload-google-drive.js
        shell: bash

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files and Google Play secrets..."
          rm -f app_config.json || true
          if [ -n "$ANDROID_PUBLISH_JSON_PATH" ]; then
            rm -f "$ANDROID_PUBLISH_JSON_PATH" || true
          fi
          echo "ANDROID_PUBLISH_JSON_PATH=" >> $GITHUB_ENV
          echo "ANDROID_PACKAGE_NAME=" >> $GITHUB_ENV
          echo "✅ Sanitization complete."
