name: Android Production AAB (App Bundle)

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      java_version:
        required: false
        type: string
        default: '17'
      pnpm_version:
        required: false
        type: string
        default: '10'
    secrets:
      APPNATIVELY_SECRETS:
        required: true


jobs:
  build-android-bundle:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          android: true
          node_version: ${{ inputs.node_version }}
          java_version: ${{ inputs.java_version }}
          pnpm_version: ${{ inputs.pnpm_version }}

      # 💉 Inject Dynamic Environment Variables
      - name: Inject Dynamic Environment Variables
        run: |
          echo "💉 Injecting dynamic environment variables into JS bundle..."
          for var in EXPO_PUBLIC_APP_ID EXPO_PUBLIC_API_URL; do
            VALUE=$(echo "${{ secrets.APPNATIVELY_SECRETS }}" | jq -r ".$var // empty")
            if [ -n "$VALUE" ]; then
              echo "✅ Injecting $var"
              sed -i "s|__PLACEHOLDER_${var}__|${VALUE}|g" android/app/src/main/assets/index.android.bundle
            else
              echo "⚠️ $var not found in secrets, skipping replacement"
            fi
          done
        working-directory: app


      - name: Build Release AAB (unsigned)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --max-workers 2 \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.parallel=true
        working-directory: app/android

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '📦 AAB Build Summary'
          metric_name: 'AAB Size'
          file_path: 'app/android/app/build/outputs/bundle/release/app-release.aab'
          platform: 'Android'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app/android/app/build/outputs/bundle/release/app-release.aab
          build_id: ${{ inputs.build_id }}
          appnatively_secrets: ${{ secrets.APPNATIVELY_SECRETS }}


