name: iOS Simulator Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'


jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}


      - name: Validate Pre-bundled Assets
        run: |
          if [ ! -f "main.jsbundle" ]; then
            echo "❌ Error: main.jsbundle not found in app/ios."
            echo "The simulator build requires pre-bundled assets because source code is excluded."
            exit 1
          fi
          echo "✅ main.jsbundle found."
        working-directory: app/ios

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -derivedDataPath build \
            SKIP_BUNDLING=1 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" | tee build.log | xcpretty
        working-directory: app/ios

      - name: Upload Build Log on Failure
        if: failure()
        run: |
          echo "### Build Error Trace 🚨" >> $GITHUB_STEP_SUMMARY
          tail -n 200 build.log >> $GITHUB_STEP_SUMMARY
          cat build.log | tail -n 200
      - name: Ingest Pre-bundled Assets
        run: |
          # Find the .app bundle in DerivedData
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name "*.app" -type d -maxdepth 1)
          echo "Found app at: $APP_PATH"
          
          # Ingest pre-bundled assets from the parent directory (copied from the release archive)
          if [ -f "../ios/main.jsbundle" ]; then
            echo "📦 Copying main.jsbundle to $APP_PATH"
            cp "../ios/main.jsbundle" "$APP_PATH/"
          else
            echo "⚠️ Warning: main.jsbundle not found in app/ios"
          fi
          
          if [ -d "../ios/assets" ]; then
            echo "📦 Copying assets to $APP_PATH"
            cp -r "../ios/assets" "$APP_PATH/"
          fi
        working-directory: app/ios

      - name: Zip Simulator App
        run: |
          # Find the .app bundle in DerivedData
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name "*.app" -type d -maxdepth 1)
          echo "Found app at: $APP_PATH"
          zip -r ../../app-ios-simulator.zip "$APP_PATH"
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🤖 iOS Simulator Build Summary'
          metric_name: 'App Size'
          file_path: 'app-ios-simulator.zip'
          platform: 'iOS Simulator'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Cloudflare R2
        uses: appnatively/workflows/.github/actions/upload-r2@master
        with:
          source: app-ios-simulator.zip
          destination: builds/${{ inputs.build_id }}/app-ios-simulator.zip

