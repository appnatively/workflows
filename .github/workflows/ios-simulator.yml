name: iOS Simulator Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'


jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}


      - name: Build for Simulator
        run: |
          xcodebuild build \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -derivedDataPath build \
            SKIP_BUNDLING=1 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" | tee build.log | xcpretty
        working-directory: app/ios

      - name: Upload Build Log on Failure
        if: failure()
        run: |
          echo "### Build Error Trace 🚨" >> $GITHUB_STEP_SUMMARY
          tail -n 200 build.log >> $GITHUB_STEP_SUMMARY
          cat build.log | tail -n 200
        working-directory: app/ios

      - name: Inject Pre-built JS and Zip Simulator App
        run: |
          # 1. Find the .app bundle in DerivedData
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name "*.app" -type d -maxdepth 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Could not find .app directory!"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"

          # 2. Inject the pre-built JS bundle and assets directly into the .app
          # (Adjust the source paths below if your bundle/assets are downloaded to a different location)
          echo "📦 Copying pre-built bundle and assets into .app..."
          cp main.jsbundle "$APP_PATH/"
          
          if [ -d "assets" ]; then
            cp -R assets "$APP_PATH/"
          fi

          # 3. Zip the final application
          echo "🗜️ Zipping simulator build..."
          zip -r ../../app-ios-simulator.zip "$APP_PATH"
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🤖 iOS Simulator Build Summary'
          metric_name: 'App Size'
          file_path: 'app-ios-simulator.zip'
          platform: 'iOS Simulator'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Cloudflare R2
        uses: appnatively/workflows/.github/actions/upload-r2@master
        with:
          source: app-ios-simulator.zip
          destination: builds/${{ inputs.build_id }}/app-ios-simulator.zip

