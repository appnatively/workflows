name: iOS Simulator Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      pnpm_version:
        required: false
        type: string
        default: '10'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Deploy Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Setup Configuration
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ./scripts/setup-config.js
        shell: bash

      - name: Download from R2
        run: node ./scripts/download-r2.js
        shell: bash

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm_version }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --filter "./app" --filter "./sdk"
        shell: bash

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ../scripts/setup-assets.js

          echo "📱 Setting up App Info..."
          node ../scripts/setup-app-info.js

          echo "🔥 Setting up Firebase..."
          node ../scripts/setup-firebase.js
        shell: bash
        working-directory: app

      - name: Expo Prebuild
        run: node ../scripts/prebuild-ios.js
        shell: bash
        working-directory: app

      - name: Get iOS Project Name
        id: ios-name
        shell: bash
        run: |
          cd app/ios
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          if [ -n "$PROJECT" ]; then
            NAME=$(basename "$PROJECT" .xcodeproj)
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "✅ Found iOS Project Name: $NAME"
          else
            echo "❌ Error: No .xcodeproj found in app/ios folder!"
            exit 1
          fi

      - name: Configure iOS Signing
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: node ../scripts/setup-ios-signing.js
        shell: bash
        working-directory: app

      - name: Cache Pods
        uses: actions/cache@v5
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true

      - name: Install Pods
        run: |
          gem install xcpretty --no-document
          pod install
        shell: bash
        working-directory: app/ios

      - name: Verify Pods Folder
        shell: bash
        run: |
          if [ ! -d "Pods" ]; then
            echo "Error: Pods folder not found!"
            exit 1
          fi
          echo "Pods folder verified successfully."
        working-directory: app/ios

      - name: Build Simulator App
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
            -scheme ${{ steps.ios-name.outputs.name }} \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO | xcpretty
        working-directory: app/ios

      - name: Zip Simulator App
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../${{ steps.ios-name.outputs.name }}-simulator.app.zip *.app
        working-directory: app/ios

      - name: Upload Build Log on Failure
        if: failure()
        run: |
          echo "### Build Error Trace 🚨" >> $GITHUB_STEP_SUMMARY
          tail -n 200 build.log >> $GITHUB_STEP_SUMMARY || true
        working-directory: app/ios

      - name: Upload to Google Drive
        env:
          FILE_PATH: app-ios-simulator.zip
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          cd ./scripts
          if [ ! -d "node_modules" ]; then
            pnpm init > /dev/null
            pnpm add googleapis@171.4.0 > /dev/null
          fi
          node upload-google-drive.js
        shell: bash

      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app_config.json || true
          if [ -n "$IOS_KEYCHAIN_PATH" ]; then
            echo "🔐 Deleting temporary signing keychain..."
            security delete-keychain "$IOS_KEYCHAIN_PATH" || true
          fi
          echo "✅ Sanitization complete."
