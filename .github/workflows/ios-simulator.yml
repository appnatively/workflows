name: iOS Simulator Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      api_url:
        required: true
        type: string
    secrets:
      BUILD_ACCESS_TOKEN:
        required: true

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_26.app
        shell: bash

      - name: Setup Configuration
        id: config
        uses: appnatively/workflows/.github/actions/setup-config@master
        with:
          api_url: ${{ inputs.api_url }}
          build_id: ${{ github.event.inputs.build_id || inputs.build_id }}
          build_access_token: ${{ secrets.BUILD_ACCESS_TOKEN }}

      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Scripts
        uses: appnatively/workflows/.github/actions/setup-scripts@master

      - name: Download App Assets & Setup App Info
        env:
          BUILD_ID: ${{ github.event.inputs.build_id || inputs.build_id }}
          API_URL: ${{ inputs.api_url }}
          BUILD_ACCESS_TOKEN: ${{ secrets.BUILD_ACCESS_TOKEN }}
        run: |
          echo "⬇️ Downloading app assets from Google Drive..."
          node ./scripts/setup-assets.js

          # 0. Setup App Info (Dynamic Package ID and App Name)
          echo "📱 Setting up App Info..."
          node ./scripts/setup-app-info.js

          # 0. Setup Firebase (fetch and run from workflows repo)
          echo "🔥 Setting up Firebase..."
          node ./scripts/setup-firebase.js
        shell: bash
        working-directory: app

      - name: Get iOS Project Name
        id: ios-name
        run: |
          if [ -f app/.ios_project_name ]; then
            echo "name=$(cat app/.ios_project_name)" >> $GITHUB_OUTPUT
          else
            echo "name=AppNativelyApp" >> $GITHUB_OUTPUT
          fi

      - name: Setup Mobile Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}
          build_id: ${{ inputs.build_id }}
          build_access_token: ${{ secrets.BUILD_ACCESS_TOKEN }}
          api_url: ${{ inputs.api_url }}

      - name: Build Simulator App
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace ${{ steps.ios-name.outputs.name }}.xcworkspace \
            -scheme ${{ steps.ios-name.outputs.name }} \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO | xcpretty
        working-directory: app/ios

      - name: Zip Simulator App
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../${{ steps.ios-name.outputs.name }}-simulator.app.zip *.app
        working-directory: app/ios

      - name: Upload Build Log on Failure
        if: failure()
        run: |
          echo "### Build Error Trace 🚨" >> $GITHUB_STEP_SUMMARY
          tail -n 200 build.log >> $GITHUB_STEP_SUMMARY || true
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🤖 iOS Simulator Build Summary'
          metric_name: 'App Size'
          file_path: 'app-ios-simulator.zip'
          platform: 'iOS Simulator'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app-ios-simulator.zip
          build_id: ${{ inputs.build_id }}
      - name: "Security Sanitization: Cleanup Configuration"
        if: always()
        shell: bash
        run: |
          echo "🧹 Securely deleting configuration files..."
          rm -f app_config.json || true
          echo "✅ Sanitization complete."
