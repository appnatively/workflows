name: iOS Simulator Build

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24.11'
      ruby_version:
        required: false
        type: string
        default: '3.3'
      pnpm_version:
        required: false
        type: string
        default: '10'
    secrets:
      APPNATIVELY_SECRETS:
        required: true

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Download from R2
        uses: appnatively/workflows/.github/actions/download-r2@master

      - name: Setup Environment
        uses: appnatively/workflows/.github/actions/setup-mobile@master
        with:
          ios: true
          node_version: ${{ inputs.node_version }}
          ruby_version: ${{ inputs.ruby_version }}
          pnpm_version: ${{ inputs.pnpm_version }}

      - name: Setup App Info (Dynamic Package ID & App Name)
        env:
          BUILD_ID: ${{ inputs.build_id }}
          SECRETS_JSON: ${{ secrets.APPNATIVELY_SECRETS }}
        run: |
          echo "📱 Setting up App Info..."
          curl -s https://raw.githubusercontent.com/appnatively/workflows/master/scripts/setup-app-info.sh | bash
        working-directory: app


      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -derivedDataPath build \
            SKIP_BUNDLING=1 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" | tee build.log | xcpretty
        working-directory: app/ios

      - name: Upload Build Log on Failure
        if: failure()
        run: |
          echo "### Build Error Trace 🚨" >> $GITHUB_STEP_SUMMARY
          tail -n 200 build.log >> $GITHUB_STEP_SUMMARY
          cat build.log | tail -n 200
        working-directory: app/ios

      - name: Inject Pre-built JS, Assets & Setup Firebase
        env:
          BUILD_ID: ${{ inputs.build_id }}
          SECRETS_JSON: ${{ secrets.APPNATIVELY_SECRETS }}
        run: |
          echo "💉 Injecting dynamic environment variables into JS bundle..."
          for var in EXPO_PUBLIC_APP_ID EXPO_PUBLIC_API_URL; do
            VALUE=$(echo "$SECRETS_JSON" | jq -r ".$var // empty")
            if [ -n "$VALUE" ]; then
              echo "✅ Injecting $var"
              # macOS sed requires an empty string for the -i flag or a backup extension
              sed -i.bak "s|__PLACEHOLDER_${var}__|${VALUE}|g" main.jsbundle && rm main.jsbundle.bak
            else
              echo "⚠️ $var not found in secrets, skipping replacement"
            fi
          done

          # 0. Setup Firebase (fetch and run from workflows repo)
          echo "🔥 Setting up Firebase..."
          curl -s https://raw.githubusercontent.com/appnatively/workflows/master/scripts/setup-firebase.sh | bash

          # 1. Find the .app bundle in DerivedData
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name "*.app" -type d -maxdepth 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Could not find .app directory!"
            exit 1
          fi
          
          echo "✅ Found app at: $APP_PATH"

          # 2. Inject the pre-built JS bundle and assets directly into the .app
          echo "📦 Copying pre-built bundle and assets into .app..."
          cp main.jsbundle "$APP_PATH/"
          
          if [ -d "assets" ]; then
            cp -R assets "$APP_PATH/"
          fi

          # 3. Inject Firebase config if present
          if [ -f "GoogleService-Info.plist" ]; then
            echo "🔥 Injecting Firebase config into .app..."
            cp "GoogleService-Info.plist" "$APP_PATH/"
          fi

          # 4. Zip the final application
          echo "🗜️ Zipping simulator build..."
          zip -r ../../app-ios-simulator.zip "$APP_PATH"
        working-directory: app/ios

      - name: Generate Job Summary
        if: always()
        uses: appnatively/workflows/.github/actions/generate-summary@master
        with:
          title: '🤖 iOS Simulator Build Summary'
          metric_name: 'App Size'
          file_path: 'app-ios-simulator.zip'
          platform: 'iOS Simulator'
          build_id: ${{ inputs.build_id }}

      - name: Upload to Google Drive
        uses: appnatively/workflows/.github/actions/upload-google-drive@master
        with:
          source: app-ios-simulator.zip
          build_id: ${{ inputs.build_id }}
          appnatively_secrets: ${{ secrets.APPNATIVELY_SECRETS }}
